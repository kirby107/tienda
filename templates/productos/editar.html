<h2>Editar Producto</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="nombre" value="{{ producto.nombre }}"><br>
    <textarea name="descripcion">{{ producto.descripcion }}</textarea><br>
    <input type="number" name="precio" value="{{ producto.precio }}"><br>
    <input type="number" name="stock" value="{{ producto.stock }}"><br>

    <select name="categoria">
        {% for c in categorias %}
            <option value="{{ c.id }}" {% if c.id == producto.categoria.id %}selected{% endif %}>
                {{ c.nombre }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Actualizar</button>
</form>
