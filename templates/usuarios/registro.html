<!DOCTYPE html>
<html>
<head>
    <title>Registro | TechStore</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #111, #333);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1e7e34;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📝 Registro TechStore</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="email" name="email" placeholder="Correo" required>
        <input type="password" name="password1" placeholder="Contraseña" required>
        <input type="password" name="password2" placeholder="Confirmar contraseña" required>

        <button type="submit">Crear cuenta</button>
    </form>

    <div class="link">
        ¿Ya tienes cuenta? <a href="/usuarios/login/">Inicia sesión</a>
    </div>
</div>

</body>
</html>
